<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin-layout}"
      th:with="activeMenu='artworks'">
<head>
    <meta charset="UTF-8">
    <title>작품 상세 - BIDEO Admin</title>
    <link rel="stylesheet" href="../../static/css/admin/admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
    <a th:href="@{/admin/artworks}" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        목록으로 돌아가기
    </a>
    <div class="detail-header">
        <h1 class="page-title">작품 상세
            <span th:if="${artwork.status == 'DISPLAY'}" class="status-badge status-active">전시중</span>
            <span th:if="${artwork.status == 'HIDDEN'}" class="status-badge status-urgent">숨김</span>
        </h1>
        <button th:if="${artwork.status == 'DISPLAY'}" class="btn-action-sm btn-primary" onclick="openModal('hideModal')">중단</button>
        <button th:if="${artwork.status == 'HIDDEN'}" class="btn-action-sm btn-primary" onclick="openModal('displayModal')">재개</button>
    </div>
    <div class="detail-columns">
        <div class="detail-col">
            <div class="detail-section">
                <h3 class="detail-section-title">기본 정보</h3>
                <div class="detail-field">
                    <span class="detail-field-label">작품명</span>
                    <span class="detail-field-value" th:text="${artwork.title} ?: '-'">-</span>
                </div>
                <div class="detail-field">
                    <span class="detail-field-label">아티스트</span>
                    <span class="detail-field-value" th:text="${artwork.artistNickname} ?: '-'">-</span>
                </div>
                <div class="detail-field">
                    <span class="detail-field-label">카테고리</span>
                    <span class="detail-field-value" th:text="${artwork.category} ?: '-'">-</span>
                </div>
                <div class="detail-field">
                    <span class="detail-field-label">판매방식</span>
                    <span class="detail-field-value" th:text="${artwork.saleType} ?: '-'">-</span>
                </div>
                <div class="detail-field">
                    <span class="detail-field-label">등록일</span>
                    <span class="detail-field-value"
                          th:text="${artwork.createdAt != null} ? ${#temporals.format(artwork.createdAt, 'yy.MM.dd')} : '-'">-</span>
                </div>
                <div class="detail-field">
                    <span class="detail-field-label">조회수</span>
                    <span class="detail-field-value text-info" th:text="${artwork.viewCount} ?: '0'">0</span>
                </div>
                <div class="detail-field">
                    <span class="detail-field-label">찜수</span>
                    <span class="detail-field-value" th:text="${artwork.likeCount} ?: '0'">0</span>
                </div>
            </div>
            <div class="detail-section">
                <h3 class="detail-section-title">기술 사양</h3>
                <div class="detail-field">
                    <span class="detail-field-label">해상도</span>
                    <span class="detail-field-value" th:text="${artwork.resolution} ?: '-'">-</span>
                </div>
                <div class="detail-field">
                    <span class="detail-field-label">용량</span>
                    <span class="detail-field-value" th:text="${artwork.fileSize} ?: '-'">-</span>
                </div>
            </div>
        </div>
        <div class="detail-col">
            <div class="detail-section">
                <h3 class="detail-section-title">거래 현황</h3>
                <div class="detail-field">
                    <span class="detail-field-label">경매상태</span>
                    <span class="detail-field-value" th:text="${artwork.auctionStatus} ?: '-'">-</span>
                </div>
                <div class="detail-field">
                    <span class="detail-field-label">현재최고가</span>
                    <span class="detail-field-value text-info" th:text="${artwork.currentPrice} ?: '-'">-</span>
                </div>
                <div class="detail-field">
                    <span class="detail-field-label">입찰수</span>
                    <span class="detail-field-value" th:text="${artwork.bidCount} ?: '0'">0</span>
                </div>
            </div>
            <div class="detail-section">
                <h3 class="detail-section-title">신고 이력</h3>
                <div class="detail-field">
                    <span class="detail-field-label">신고횟수</span>
                    <span class="detail-field-value text-warn" th:text="${artwork.reportCount} ?: '0'">0</span>
                </div>
                <div class="detail-field">
                    <span class="detail-field-label">최근신고</span>
                    <span class="detail-field-value text-muted"
                          th:text="${artwork.lastReportDate != null} ? ${#temporals.format(artwork.lastReportDate, 'yy.MM.dd')} : '-'">-</span>
                </div>
            </div>
        </div>
    </div>
</div>
<div layout:fragment="modals">
    <div class="modal-overlay" id="hideModal"><div class="modal"><div class="modal-header">전시 중단 처리</div><div class="modal-body"><label>중단 사유</label><textarea placeholder="사유를 상세히 입력하세요 (예: 작가 요청, 부적절한 콘텐츠 등)"></textarea></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('hideModal')">취소</button><button class="btn btn-danger">중단 처리</button></div></div></div>
    <div class="modal-overlay" id="displayModal"><div class="modal"><div class="modal-header">전시 재개</div><div class="modal-body">이 작품의 전시를 재개합니다.</div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('displayModal')">취소</button><button class="btn btn-primary">확인</button></div></div></div>
</div>
</body>
</html>
