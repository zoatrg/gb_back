<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE">BIDEO Admin</title>
    <link rel="stylesheet" th:href="@{/static/css/admin/admin-style.css}">
    <link rel="stylesheet" th:href="@{/static/css/admin/admin-override.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <div th:replace="~{admin/admin-lnb :: adminLnb(${activeMenu})}"></div>

    <main class="admin-main">
        <div class="admin-content" layout:fragment="content">
        </div>
    </main>
</div>

<!-- Common Modals -->
<div layout:fragment="modals"></div>

<!-- Common Toast -->
<div class="toast" id="toast"></div>

<script>
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
}
document.addEventListener('click', function(e) {
    var link = e.target.closest('[data-goto-member]');
    if (link) {
        e.stopPropagation();
        e.preventDefault();
        var memberId = link.getAttribute('data-goto-member');
        location.href = '/admin/members/' + memberId;
    }
});
</script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
