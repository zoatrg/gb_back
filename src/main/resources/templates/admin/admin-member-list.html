<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin-layout}"
      th:with="activeMenu='members'">
<head>
    <meta charset="UTF-8">
    <title>회원관리 - BIDEO Admin</title>
    <link rel="stylesheet" href="../../static/css/admin/admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1 class="page-title">회원관리</h1>
    </div>

    <div class="filter-bar">
        <div class="filter-search">
            <svg class="filter-search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="searchInput" placeholder="이메일 또는 닉네임 검색...">
        </div>
        <div class="filter-tabs">
            <button class="filter-tab active" data-status="all">전체</button>
            <button class="filter-tab" data-status="ACTIVE">활동회원</button>
            <button class="filter-tab" data-status="SUSPENDED">정지회원</button>
        </div>
    </div>

    <table class="data-table">
        <thead>
        <tr>
            <th style="width:50px">번호</th>
            <th style="width:200px">이메일</th>
            <th style="width:100px">닉네임</th>
            <th style="width:70px">유형</th>
            <th style="width:80px">상태</th>
            <th style="width:90px">가입일</th>
            <th style="width:60px">신고</th>
            <th style="width:80px">거래건수</th>
        </tr>
        </thead>
        <tbody id="memberTableBody">
        <tr th:each="member, iter : ${memberList}"
            th:onclick="'location.href=\'' + @{/admin/members/{id}(id=${member.id})} + '\''"
            style="cursor:pointer">
            <td th:text="${totalCount - iter.index}">1</td>
            <td th:text="${member.email}">user@email.com</td>
            <td th:text="${member.nickname}">닉네임</td>
            <td th:text="${member.memberType} ?: '-'">-</td>
            <td>
                <span th:if="${member.status == 'ACTIVE'}" class="status-badge status-active">활동</span>
                <span th:if="${member.status == 'SUSPENDED'}" class="status-badge status-urgent">정지</span>
            </td>
            <td th:text="${#temporals.format(member.createdAt, 'yy.MM.dd')}" th:if="${member.createdAt != null}">24.01.01</td>
            <td th:if="${member.createdAt == null}">-</td>
            <td th:text="${member.reportCount} ?: 0"
                th:style="${member.reportCount != null and member.reportCount > 0} ? 'color:var(--admin-error);font-weight:500' : ''">0</td>
            <td th:text="${member.transactionCount != null} ? ${member.transactionCount} + '건' : '0건'">0건</td>
        </tr>
        </tbody>
    </table>

    <div class="table-footer">
        <div class="page-size-group">
            <span>페이지당 행 수:</span>
            <div class="page-size-trigger" onclick="this.classList.toggle('open'); this.querySelector('.page-size-menu').classList.toggle('open')">
                <span class="trigger-text">30</span>
                <svg class="trigger-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M18.707 8.793a1 1 0 00-1.414 0L12 14.086 6.707 8.793a1 1 0 10-1.414 1.414L12 16.914l6.707-6.707a1 1 0 000-1.414Z"/></svg>
                <div class="page-size-menu">
                    <div class="page-size-menu-item selected" data-value="30">30</div>
                    <div class="page-size-menu-item" data-value="50">50</div>
                    <div class="page-size-menu-item" data-value="100">100</div>
                </div>
            </div>
        </div>
        <span class="page-description" th:text="${totalCount} ? |${totalCount}개 중 1~${totalCount > 30 ? 30 : totalCount}| : '0개'">0개</span>
        <div class="page-nav">
            <button class="page-nav-btn" disabled title="첫 페이지">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M18.293 4.293 10.586 12l7.707 7.707a1 1 0 101.414-1.414L13.414 12l6.293-6.293a1 1 0 10-1.414-1.414ZM6 4a1 1 0 00-1 1v14a1 1 0 102 0V5a1 1 0 00-1-1Z"/></svg>
            </button>
            <button class="page-nav-btn" disabled title="이전 페이지">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M13.793 5.293 7.086 12l6.707 6.707a1 1 0 101.414-1.414L9.914 12l5.293-5.293a1 1 0 10-1.414-1.414Z"/></svg>
            </button>
            <!-- 페이지 번호 버튼 (active = 현재 페이지) -->
            <!--<button class="page-num-btn active">1</button>-->
            <!--<button class="page-num-btn">2</button>-->
            <!--<button class="page-num-btn">3</button>-->
            <button class="page-nav-btn" title="다음 페이지">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M8.793 5.293a1 1 0 000 1.414L14.086 12l-5.293 5.293a1 1 0 101.414 1.414L16.914 12l-6.707-6.707a1 1 0 00-1.414 0Z"/></svg>
            </button>
        </div>
    </div>

    <div class="empty-state" id="emptyState" style="display:none">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <p class="empty-state-text">등록된 회원이 없습니다</p>
    </div>
</div>
</body>
</html>
